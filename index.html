<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>찌개집 막내아들</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="top-panel">
      <div>
        <p class="eyebrow">1분 안에 주문을 최대한 많이 처리하세요</p>
        <h1>찌개집 막내아들</h1>
      </div>

      <div class="top-actions">
        <button id="rankingButton" class="secondary-button" type="button">랭킹 조회</button>
        <div class="sound-panel" aria-label="사운드 설정">
          <button id="bgmToggleButton" class="subtle-button" type="button" aria-pressed="false">BGM OFF</button>
          <label class="volume-control" for="bgmVolume">
            <span>음악</span>
            <input id="bgmVolume" type="range" min="0" max="100" value="32">
          </label>
        </div>
        <div class="status-board" aria-label="게임 상태">
          <div class="status-item">
            <span>남은 시간</span>
            <strong id="timeLeft">60</strong>
          </div>
          <div class="status-item">
            <span>성공</span>
            <strong id="score">0</strong>
          </div>
          <div class="status-item danger">
            <span>목숨</span>
            <strong id="lives">3</strong>
          </div>
        </div>
      </div>
    </section>

    <section class="play-area">
      <aside class="recipe-panel">
        <div class="panel-title">
          <h2>레시피</h2>
          <button id="recipeToggleButton" class="subtle-button recipe-toggle-button" type="button" aria-expanded="true" aria-controls="recipeGrid">접기</button>
        </div>
        <div class="recipe-grid" id="recipeGrid">
          <article>
            <h3>부대찌개</h3>
            <p>육수, 햄, 소시지, 양념장</p>
          </article>
          <article>
            <h3>김치찌개</h3>
            <p>육수, 김치, 돼지고기</p>
          </article>
          <article>
            <h3>동태찌개</h3>
            <p>육수, 동태, 고니, 콩나물</p>
          </article>
        </div>
      </aside>

      <section class="kitchen-panel">
        <div class="order-panel">
          <div class="current-order">
            <span class="label">주문표</span>
            <strong id="currentOrder">게임 시작을 눌러주세요</strong>
          </div>
          <div class="order-list" id="orderQueue" aria-label="대기 주문"></div>
        </div>

        <div class="pot-area">
          <div class="steam" id="steam" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="cookware-stage" aria-label="냄비와 가스버너">
            <img class="cookware-image" src="images/empty-cookware-burner.png" alt="빈 냄비와 가스버너">
            <span class="cookware-flame" aria-hidden="true"></span>
            <div class="pot-contents-overlay">
              <div id="potContents" class="pot-contents">재료를 클릭해서 넣으세요</div>
            </div>
          </div>
        </div>

        <button id="burnerButton" class="burner" type="button" aria-label="가스버너 켜기">
          <span id="cookedBadge" class="burner-cooked-badge hidden">조리 완료</span>
          <span class="burner-top"></span>
          <span id="burnerText">가스버너 켜기</span>
        </button>

        <div class="action-row">
          <button id="startButton" class="secondary-button" type="button">게임 시작</button>
          <button id="packButton" class="primary-button" type="button">포장하기</button>
        </div>

        <p id="message" class="message">재료를 담고 포장합니다, 조리 주문은 버너로 끓인 뒤 포장하세요.</p>
      </section>

      <aside class="ingredients-panel">
        <div class="panel-title">
          <h2>재료</h2>
          <button id="clearPotButton" class="subtle-button" type="button">냄비 비우기</button>
        </div>
        <div class="ingredients-grid" id="ingredients"></div>
      </aside>
    </section>
  </main>

  <div class="modal hidden" id="resultModal" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="modal-box">
      <h2 id="resultTitle">게임 종료</h2>
      <p id="resultText"></p>
      <div class="ranking-save">
        <label for="nicknameInput">닉네임</label>
        <div class="ranking-save-row">
          <input id="nicknameInput" type="text" maxlength="10" placeholder="닉네임 입력">
          <button id="saveRankingButton" class="secondary-button" type="button">기록 저장</button>
        </div>
        <p id="rankingSaveMessage" class="small-message"></p>
      </div>
      <button id="closeResultButton" class="primary-button" type="button">닫기</button>
    </div>
  </div>

  <div class="modal hidden" id="rankingModal" role="dialog" aria-modal="true" aria-labelledby="rankingTitle">
    <div class="modal-box ranking-modal-box">
      <h2 id="rankingTitle">랭킹 TOP 10</h2>
      <ol id="rankingList" class="ranking-list"></ol>
      <p id="emptyRanking" class="small-message">아직 저장된 기록이 없습니다.</p>
      <button id="closeRankingButton" class="primary-button" type="button">닫기</button>
    </div>
  </div>

  <audio id="bgmSound" src="sounds/bgm.mp3" preload="auto" loop></audio>
  <audio id="gasSound" src="sounds/gas.mp3" preload="auto"></audio>
  <script src="script.js"></script>
</body>
</html>
